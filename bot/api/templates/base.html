<!doctype html>
<html lang="uk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>{% block title %}{% endblock %}</title>

<style>
:root {
    --primary: #2563eb;
    --primary-dark: #1d4ed8;
    --dark: #0f172a;
    --bg: #f5f7fa;
    --text: #1f2937;
    --surface: #ffffff;
    --muted: #64748b;
    --border: #e2e8f0;
    --container: 1120px;
}

* { box-sizing: border-box; }
html { scroll-behavior: smooth; }

body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
}

.container {
    width: min(100%, var(--container));
    margin: 0 auto;
    padding: 0 16px;
}
    /* Бургер меню */
.menu-toggle {
    width: 42px;
    height: 42px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: #fff;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 4px;
    cursor: pointer;
}

.menu-toggle span {
    display: block;
    width: 18px;
    height: 2px;
    background: var(--dark);
}

.nav-list {
    list-style: none;
    padding: 0;
    margin: 0;
}

.nav-link {
    display: block;
    padding: 10px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: #fff;
    text-decoration: none;
}
/* HEADER */

.header {
    position: sticky;
    top: 0;
    z-index: 20;
    background: rgba(255,255,255,0.98);
    border-bottom: 1px solid var(--border);
}

.header-row {
    min-height: 62px;
    display: flex;
    align-items: center;
    justify-content: space-between;
}

.brand {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    color: inherit;
}

.logo {
    width: 40px;
    height: 40px;
    object-fit: cover;
    border-radius: 10px;
}

/* NAV */

.nav { display: none; }
.nav.open { display: block; }

/* HERO */

.hero-slider {
    width: 100vw;           /* 🔥 повна ширина */
    margin-left: calc(-50vw + 50%); /* 🔥 вихід за container */
    background: #000;
    overflow: hidden;
}

.slide {
    width: 100%;
    height: auto;
    display: block;
    margin: 0 auto;
    object-fit: contain;
}

.slide.active { opacity: 1; }

.hero {
    background: linear-gradient(135deg,#0f172a,#2563eb);
    color:#fff;
    text-align:center;
    padding:40px 0;
}

/* GRID */

.card-grid {
    display:grid;
    gap:16px;
    grid-template-columns: repeat(1,1fr);
}

@media (min-width:768px){
    .card-grid { grid-template-columns: repeat(2,1fr); }
}

@media (min-width:1024px){
    .card-grid { grid-template-columns: repeat(3,1fr); }
}

/* CARD */

.card {
    background:#fff;
    border:1px solid var(--border);
    border-radius:16px;
    padding:16px;
}

/* IMAGE */

.card-photo {
    width:100%;
    height:200px;
    object-fit:contain;
    background:#f1f5f9;
    border-radius:10px;
    padding:10px;
}

/* BUTTON */

.btn {
    background:var(--primary);
    color:#fff;
    border:none;
    border-radius:10px;
    padding:10px 14px;
}

/* FOOTER */

.footer {
    margin-top:40px;
    border-top:1px solid var(--border);
    background:#fff;
    padding:20px;
    text-align:center;
}
</style>

</head>

<body>

{% block content %}{% endblock %}

<script>
document.addEventListener("DOMContentLoaded", function () {
const slides = document.querySelectorAll(".slide");
if (slides.length > 1) {
let i = 0;
setInterval(() => {
slides[i].classList.remove("active");
i = (i + 1) % slides.length;
slides[i].classList.add("active");
}, 3000);
}

const btn = document.getElementById("menuToggle");
const nav = document.getElementById("siteNav");

if (btn && nav) {
btn.onclick = () => nav.classList.toggle("open");
}
});
</script>

</body>
</html>
