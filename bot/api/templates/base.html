<!doctype html>
<html lang="uk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>{% block title %}{% endblock %}</title>

<style>
:root {
    --primary: #2563eb;
    --primary-dark: #1d4ed8;
    --dark: #0f172a;
    --bg: #f5f7fa;
    --text: #1f2937;
    --surface: #ffffff;
    --muted: #64748b;
    --border: #e2e8f0;
    --header-bg: rgba(255,255,255,0.98);
    --nav-bg: #fff;
    --on-dark: #e5e7eb;
    --dark-border: #1f2937;
    --dark-surface: #111827;
    --button-text: #fff;
    --floating-bg: rgb(20, 20, 20);
    --floating-hover: rgb(181, 160, 255);
    --floating-shadow: rgba(180, 160, 255, 0.25);
    --success: #22c55e;
    --success-dark: #16a34a;
    --card-bg: #0f172a;
    --card-inner-bg: #1e293b;
    --card-hover-bg: #334155;
    --card-text: #fff;
    --card-muted: #94a3b8;
    --card-desc: #cbd5f5;
    --modal-control-bg: #334155;
    --modal-control-hover: #475569;
    --modal-danger: #ef4444;
    --container: 1120px;
}

.theme-light_blue {
    --primary: #00ABE4;
    --primary-dark: #008FC0;
    --dark: #0f172a;
    --bg: #E9F1FA;
    --text: #1f2937;
    --surface: #FFFFFF;
    --muted: #64748b;
    --border: #cbd5e1;
    --header-bg: #FFFFFF;
    --nav-bg: #FFFFFF;
    --dark-surface: #FFFFFF;
    --floating-bg: var(--primary);
    --floating-hover: var(--primary-dark);
    --floating-shadow: rgba(0, 171, 228, 0.25);
    --success: var(--primary);
    --success-dark: var(--primary-dark);
    --card-bg: var(--surface);
    --card-inner-bg: var(--bg);
    --card-hover-bg: var(--primary);
    --card-text: var(--text);
    --card-muted: var(--muted);
    --card-desc: #334155;
    --modal-control-bg: var(--surface);
    --modal-control-hover: var(--border);
    --modal-danger: var(--primary);
}

.theme-neon_dark {
    --primary: #2272FF;
    --primary-dark: #1557CC;
    --dark: #1D1D1D;
    --bg: #1D1D1D;
    --text: #FFFFFF;
    --surface: #252525;
    --muted: #A3A3A3;
    --border: #333333;
    --header-bg: #252525;
    --nav-bg: #252525;
    --on-dark: #FFFFFF;
    --dark-border: #333333;
    --dark-surface: #252525;
    --floating-bg: var(--primary);
    --floating-hover: var(--primary-dark);
    --floating-shadow: rgba(34, 114, 255, 0.25);
    --success: var(--primary);
    --success-dark: var(--primary-dark);
    --card-bg: var(--surface);
    --card-inner-bg: var(--bg);
    --card-hover-bg: var(--primary);
    --card-text: var(--text);
    --card-muted: var(--muted);
    --card-desc: #d1d5db;
    --modal-control-bg: var(--surface);
    --modal-control-hover: var(--border);
    --modal-danger: var(--primary);
}

.theme-parts_dark_red {
    --primary: #dc2626;
    --primary-dark: #991b1b;
    --dark: #080b12;
    --bg: #080b12;
    --text: #ffffff;
    --surface: #101624;
    --muted: #94a3b8;
    --border: #3f1f29;
    --header-bg: #0b1220;
    --nav-bg: #0b1220;
    --on-dark: #ffffff;
    --dark-border: #3f1f29;
    --dark-surface: #111827;
    --button-text: #ffffff;
    --floating-bg: #dc2626;
    --floating-hover: #991b1b;
    --floating-shadow: rgba(220, 38, 38, 0.28);
    --success: #dc2626;
    --success-dark: #991b1b;
    --card-bg: #0f172a;
    --card-inner-bg: #111827;
    --card-hover-bg: #7f1d1d;
    --card-text: #ffffff;
    --card-muted: #cbd5e1;
    --card-desc: #d1d5db;
    --modal-control-bg: #1f2937;
    --modal-control-hover: #374151;
    --modal-danger: #f87171;
}

.theme-premium_dark {
    --primary: #178582;
    --primary-dark: #0F5F5D;
    --dark: #0A1828;
    --bg: #0A1828;
    --text: #FFFFFF;
    --surface: #10243A;
    --muted: #BFA181;
    --border: #178582;
    --header-bg: #10243A;
    --nav-bg: #10243A;
    --on-dark: #FFFFFF;
    --dark-border: #178582;
    --dark-surface: #10243A;
    --floating-bg: var(--primary);
    --floating-hover: var(--primary-dark);
    --floating-shadow: rgba(191, 161, 129, 0.25);
    --success: var(--primary);
    --success-dark: var(--primary-dark);
    --card-bg: var(--surface);
    --card-inner-bg: var(--bg);
    --card-hover-bg: var(--primary);
    --card-text: var(--text);
    --card-muted: #d6c2ab;
    --card-desc: #e7d7c4;
    --modal-control-bg: var(--surface);
    --modal-control-hover: var(--border);
    --modal-danger: var(--primary);
}

.theme-electric_premium_dark {
    --primary: #2563eb;
    --primary-dark: #1d4ed8;
    --accent: #38bdf8;
    --dark: #050816;
    --bg: #050816;
    --text: #ffffff;
    --surface: #0b1020;
    --muted: #94a3b8;
    --border: #1e293b;
    --header-bg: rgba(5, 8, 22, 0.96);
    --nav-bg: #0b1020;
    --on-dark: #ffffff;
    --dark-border: #1e293b;
    --dark-surface: #0b1020;
    --button-text: #ffffff;
    --floating-bg: #2563eb;
    --floating-hover: #1d4ed8;
    --floating-shadow: rgba(37, 99, 235, 0.32);
    --success: #38bdf8;
    --success-dark: #0284c7;
    --card-bg: #0b1020;
    --card-inner-bg: #111827;
    --card-hover-bg: #172554;
    --card-text: #ffffff;
    --card-muted: #cbd5e1;
    --card-desc: #dbeafe;
    --modal-control-bg: #1e293b;
    --modal-control-hover: #334155;
    --modal-danger: #f59e0b;
}

* { box-sizing: border-box; }
html { scroll-behavior: smooth; }

body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
}

/* CONTAINER */
.container {
    width: min(100%, var(--container));
    margin: 0 auto;
    padding: 0 16px;
}

/* HEADER */
.header {
    position: sticky;
    top: 0;
    z-index: 20;
    background: var(--header-bg);
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(10px);
}

.header-row {
    min-height: 62px;
    display: flex;
    align-items: center;
    justify-content: space-between;
}

.brand {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    color: inherit;
}

.logo {
    width: 40px;
    height: 40px;
    object-fit: cover;
    border-radius: 10px;
}

/* BURGER */
.menu-toggle {
    width: 44px;
    height: 44px;
    border: 1px solid var(--primary);
    border-radius: 12px;
    background: color-mix(in srgb, var(--header-bg) 82%, #000 18%);
    color: var(--card-text);

    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;

    gap: 5px;
    cursor: pointer;

    box-shadow: 0 0 0 3px rgba(255,255,255,0.04);
}

.menu-toggle span {
    width: 20px;
    height: 2px;
    border-radius: 999px;
    background: var(--card-text);
    transition: all 0.3s ease;
}

.theme-light_blue .menu-toggle {
    background: #ffffff;
    border-color: var(--border);
}

.theme-light_blue .menu-toggle span {
    background: #0f172a;
}

.theme-parts_dark_red .menu-toggle {
    background: #111827;
    border-color: #dc2626;
}

.theme-parts_dark_red .menu-toggle span {
    background: #ffffff;
}

.theme-electric_premium_dark .menu-toggle {
    background: #111827;
    border-color: #38bdf8;
}

.theme-electric_premium_dark .menu-toggle span {
    background: #ffffff;
}

.menu-toggle.active span:nth-child(1) {
    transform: rotate(45deg) translate(4px, 4px);
}

.menu-toggle.active span:nth-child(2) {
    opacity: 0;
}

.menu-toggle.active span:nth-child(3) {
    transform: rotate(-45deg) translate(5px, -5px);
}

/* NAV */
.nav {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.4s ease;
    background: var(--nav-bg);
}

.nav.open {
    max-height: calc(100vh - 62px);
    overflow-y: auto;
}

.nav-list {
    list-style: none;
    padding: 0;
    margin: 0;
}

.nav-link {
    display: block;
    padding: 14px;
    border-bottom: 1px solid var(--border);
    text-decoration: none;
    color: var(--text);
    background: var(--nav-bg);
}

/* ===== SERVICES ===== */

.services-split {
    background: var(--dark);
    color: var(--on-dark);
    padding: 60px 0;
}

.split {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 40px;
    align-items: center;
}

/* LEFT */
.left h2 {
    margin-bottom: 20px;
}

.left ul {
    list-style: none;
    padding: 0;
    margin: 0;
}

.service-item {
    padding: 12px 0;
    border-bottom: 1px solid var(--dark-border);
    cursor: pointer;
    transition: 0.2s;
}

.service-item:hover {
    transform: translateX(5px);
}

.service-item.active {
    color: var(--button-text);
    font-weight: 600;
}

/* RIGHT */
.highlight {
    background: var(--dark-surface);
    padding: 24px;
    border-radius: 14px;
    border: 1px solid var(--dark-border);
    transition: opacity 0.3s ease;

    color: var(--card-text);
}

.highlight h3 {
    color: var(--card-text);
}

.highlight p {
    color: var(--card-desc);
}

.service-price {
    display: inline-flex;
    margin-top: 12px;
    color: var(--accent, var(--primary));
    font-weight: 700;
}

.theme-electric_premium_dark .services-split {
    position: relative;
    overflow: hidden;
    background:
        radial-gradient(circle at 15% 15%, rgba(37, 99, 235, 0.28), transparent 30%),
        radial-gradient(circle at 85% 0%, rgba(56, 189, 248, 0.16), transparent 34%),
        linear-gradient(180deg, #050816 0%, #08111f 52%, #050816 100%);
}

.theme-electric_premium_dark .services-split::before {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    background-image:
        linear-gradient(rgba(56, 189, 248, 0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(56, 189, 248, 0.05) 1px, transparent 1px);
    background-size: 58px 58px;
    mask-image: linear-gradient(to bottom, transparent, #000 16%, #000 82%, transparent);
}

.theme-electric_premium_dark .services-split .container {
    position: relative;
    z-index: 1;
}

.theme-electric_premium_dark .left h2 {
    font-size: clamp(32px, 5vw, 56px);
    line-height: 1;
    margin: 0 0 24px;
    letter-spacing: -0.04em;
}

.theme-electric_premium_dark .service-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
    margin-bottom: 12px;
    padding: 16px 18px;
    border: 1px solid rgba(56, 189, 248, 0.18);
    border-radius: 18px;
    background: rgba(15, 23, 42, 0.62);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);
    backdrop-filter: blur(16px);
}

.theme-electric_premium_dark .service-item::before {
    content: "⚡";
    display: inline-grid;
    place-items: center;
    width: 34px;
    height: 34px;
    flex: 0 0 auto;
    border-radius: 12px;
    background: rgba(37, 99, 235, 0.22);
    color: #38bdf8;
    box-shadow: 0 0 24px rgba(56, 189, 248, 0.18);
}

.theme-electric_premium_dark .service-item:hover,
.theme-electric_premium_dark .service-item.active {
    transform: translateX(0) translateY(-3px);
    border-color: rgba(56, 189, 248, 0.7);
    background: linear-gradient(135deg, rgba(37, 99, 235, 0.28), rgba(15, 23, 42, 0.86));
    box-shadow: 0 18px 46px rgba(37, 99, 235, 0.18);
}

.theme-electric_premium_dark .highlight {
    position: relative;
    overflow: hidden;
    min-height: 330px;
    padding: 34px;
    border-color: rgba(56, 189, 248, 0.28);
    border-radius: 28px;
    background:
        linear-gradient(145deg, rgba(17, 24, 39, 0.9), rgba(11, 16, 32, 0.78)),
        radial-gradient(circle at 90% 10%, rgba(56, 189, 248, 0.24), transparent 30%);
    box-shadow: 0 26px 80px rgba(2, 6, 23, 0.56), inset 0 1px 0 rgba(255,255,255,0.06);
    backdrop-filter: blur(18px);
}

.theme-electric_premium_dark .highlight::before {
    content: "DIAGNOSTIC LIVE";
    display: inline-flex;
    margin-bottom: 28px;
    padding: 8px 12px;
    border: 1px solid rgba(56, 189, 248, 0.26);
    border-radius: 999px;
    color: #38bdf8;
    background: rgba(56, 189, 248, 0.08);
    font-size: 12px;
    font-weight: 800;
    letter-spacing: 0.12em;
}

.theme-electric_premium_dark .highlight h3 {
    margin: 0 0 14px;
    font-size: clamp(26px, 3vw, 40px);
    letter-spacing: -0.03em;
}

.theme-electric_premium_dark .highlight p {
    font-size: 17px;
    line-height: 1.7;
}

.theme-electric_premium_dark .btn-primary {
    border: 1px solid rgba(56, 189, 248, 0.42);
    background: linear-gradient(135deg, #2563eb, #38bdf8);
    box-shadow: 0 14px 36px rgba(37, 99, 235, 0.32);
    font-weight: 800;
}

.theme-electric_premium_dark .btn-primary:hover {
    background: linear-gradient(135deg, #1d4ed8, #0284c7);
    box-shadow: 0 18px 46px rgba(56, 189, 248, 0.28);
    transform: translateY(-2px);
}

.electric-service-extras {
    position: relative;
    z-index: 1;
    margin-top: 34px;
}

.electric-section-title {
    margin: 0 0 16px;
    color: #ffffff;
    font-size: clamp(24px, 3vw, 36px);
    letter-spacing: -0.03em;
}

.electric-problems-grid,
.electric-trust-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
}

.electric-problem,
.electric-trust-item {
    border: 1px solid rgba(56, 189, 248, 0.18);
    border-radius: 18px;
    background: rgba(15, 23, 42, 0.58);
    color: #dbeafe;
    padding: 16px;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);
}

.electric-problem strong,
.electric-trust-item strong {
    color: #ffffff;
}

.electric-diagnostic-cta {
    display: grid;
    grid-template-columns: 1.4fr auto;
    align-items: center;
    gap: 22px;
    margin: 34px 0;
    padding: 28px;
    border: 1px solid rgba(56, 189, 248, 0.3);
    border-radius: 28px;
    background:
        radial-gradient(circle at 12% 25%, rgba(56, 189, 248, 0.18), transparent 28%),
        linear-gradient(135deg, rgba(37, 99, 235, 0.26), rgba(15, 23, 42, 0.82));
    box-shadow: 0 24px 70px rgba(37, 99, 235, 0.18);
}

.electric-diagnostic-cta h3 {
    margin: 0 0 8px;
    font-size: clamp(26px, 4vw, 42px);
}

.electric-diagnostic-cta p {
    margin: 0;
    color: #cbd5e1;
    font-size: 17px;
}

.electric-diagnostic-cta .btn-primary {
    margin-top: 0;
    white-space: nowrap;
}

.highlight.fade {
    opacity: 0.4;
}

.highlight-img {
    width: 100%;
    height: 220px;
    max-height: 260px;
    object-fit: contain;
    object-position: center;
    border-radius: 12px;
    background: #020617;
    margin-bottom: 15px;
}

.theme-parts_dark_red .highlight-img {
    background:
        radial-gradient(circle at center, rgba(220,38,38,.14), transparent 55%),
        #020617;
    border: 1px solid rgba(220,38,38,.20);
}

.btn-primary {
    display: inline-block;
    margin-top: 15px;
    background: var(--primary);
    color: var(--button-text);
    padding: 10px 16px;
    border-radius: 10px;
    text-decoration: none;
    transition: 0.2s ease;
}

.btn-primary:hover {
    background: var(--primary-dark);
}

/* MOBILE */
@media (max-width: 768px) {
    .split {
        grid-template-columns: 1fr;
        gap: 24px;
    }

    .services-split {
        padding: 40px 0;
    }

    .theme-electric_premium_dark .split,
    .electric-diagnostic-cta {
        grid-template-columns: 1fr;
    }

    .electric-problems-grid,
    .electric-trust-grid {
        grid-template-columns: 1fr;
    }

    .theme-electric_premium_dark .highlight {
        min-height: auto;
        padding: 24px;
    }
}
</style>

</head>

{% set theme = config.get('theme', {}).get('scheme', 'default') %}
<body class="theme-{{ theme }}">

{% block content %}{% endblock %}

<script>
document.addEventListener("DOMContentLoaded", function () {

    /* BURGER */
    const btn = document.getElementById("menuToggle");
    const nav = document.getElementById("siteNav");

    if (btn && nav) {
        btn.onclick = () => {
            nav.classList.toggle("open");
            btn.classList.toggle("active");
        };

        document.querySelectorAll(".nav-link").forEach(link => {
            link.onclick = () => {
                nav.classList.remove("open");
                btn.classList.remove("active");
            };
        });
    }

    /* ===== SERVICES INTERACTIVE ===== */

    const items = document.querySelectorAll(".service-item");
    const title = document.getElementById("serviceTitle");
    const desc = document.getElementById("serviceDescription");
    const price = document.getElementById("servicePrice");
    const img = document.getElementById("serviceImage");
    const box = document.getElementById("serviceDisplay");

    if (!items.length || !title || !desc || !box) return;

    items.forEach(item => {
        item.addEventListener("click", () => {

            items.forEach(i => i.classList.remove("active"));
            item.classList.add("active");

            box.classList.add("fade");

            setTimeout(() => {

                title.textContent = item.dataset.title;
                desc.textContent = item.dataset.description || "";

                if (price) {
                    const priceLabel = item.dataset.priceLabel || (item.dataset.price ? `від ${item.dataset.price} грн` : "");
                    price.textContent = priceLabel;
                    price.style.display = priceLabel ? "inline-flex" : "none";
                }

                if (img && item.dataset.photo) {
                    img.src = item.dataset.photo;
                    img.style.display = "block";
                }

                if (img && !item.dataset.photo) {
                    img.style.display = "none";
                }

                box.classList.remove("fade");

            }, 150);
        });
    });

});
</script>

</body>
</html>
