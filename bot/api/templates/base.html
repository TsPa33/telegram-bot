<!doctype html>
<html lang="uk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>{% block title %}{% endblock %}</title>

<style>
:root {
    --primary: #2563eb;
    --primary-dark: #1d4ed8;
    --dark: #0f172a;
    --bg: #f5f7fa;
    --text: #1f2937;
    --surface: #ffffff;
    --muted: #64748b;
    --border: #e2e8f0;
    --header-bg: rgba(255,255,255,0.98);
    --nav-bg: #fff;
    --on-dark: #e5e7eb;
    --dark-border: #1f2937;
    --dark-surface: #111827;
    --button-text: #fff;
    --floating-bg: rgb(20, 20, 20);
    --floating-hover: rgb(181, 160, 255);
    --floating-shadow: rgba(180, 160, 255, 0.25);
    --success: #22c55e;
    --success-dark: #16a34a;
    --card-bg: #0f172a;
    --card-inner-bg: #1e293b;
    --card-hover-bg: #334155;
    --card-text: #fff;
    --card-muted: #94a3b8;
    --card-desc: #cbd5f5;
    --modal-control-bg: #334155;
    --modal-control-hover: #475569;
    --modal-danger: #ef4444;
    --container: 1120px;
}

.theme-light_blue {
    --primary: #00ABE4;
    --primary-dark: #008FC0;
    --dark: #0f172a;
    --bg: #E9F1FA;
    --text: #1f2937;
    --surface: #FFFFFF;
    --muted: #64748b;
    --border: #cbd5e1;
    --header-bg: #FFFFFF;
    --nav-bg: #FFFFFF;
    --dark-surface: #FFFFFF;
    --floating-bg: var(--primary);
    --floating-hover: var(--primary-dark);
    --floating-shadow: rgba(0, 171, 228, 0.25);
    --success: var(--primary);
    --success-dark: var(--primary-dark);
    --card-bg: var(--surface);
    --card-inner-bg: var(--bg);
    --card-hover-bg: var(--primary);
    --card-text: var(--text);
    --card-muted: var(--muted);
    --card-desc: #334155;
    --modal-control-bg: var(--surface);
    --modal-control-hover: var(--border);
    --modal-danger: var(--primary);
}

.theme-neon_dark {
    --primary: #2272FF;
    --primary-dark: #1557CC;
    --dark: #1D1D1D;
    --bg: #1D1D1D;
    --text: #FFFFFF;
    --surface: #252525;
    --muted: #A3A3A3;
    --border: #333333;
    --header-bg: #252525;
    --nav-bg: #252525;
    --on-dark: #FFFFFF;
    --dark-border: #333333;
    --dark-surface: #252525;
    --floating-bg: var(--primary);
    --floating-hover: var(--primary-dark);
    --floating-shadow: rgba(34, 114, 255, 0.25);
    --success: var(--primary);
    --success-dark: var(--primary-dark);
    --card-bg: var(--surface);
    --card-inner-bg: var(--bg);
    --card-hover-bg: var(--primary);
    --card-text: var(--text);
    --card-muted: var(--muted);
    --card-desc: #d1d5db;
    --modal-control-bg: var(--surface);
    --modal-control-hover: var(--border);
    --modal-danger: var(--primary);
}

.theme-premium_dark {
    --primary: #178582;
    --primary-dark: #0F5F5D;
    --dark: #0A1828;
    --bg: #0A1828;
    --text: #FFFFFF;
    --surface: #10243A;
    --muted: #BFA181;
    --border: #178582;
    --header-bg: #10243A;
    --nav-bg: #10243A;
    --on-dark: #FFFFFF;
    --dark-border: #178582;
    --dark-surface: #10243A;
    --floating-bg: var(--primary);
    --floating-hover: var(--primary-dark);
    --floating-shadow: rgba(191, 161, 129, 0.25);
    --success: var(--primary);
    --success-dark: var(--primary-dark);
    --card-bg: var(--surface);
    --card-inner-bg: var(--bg);
    --card-hover-bg: var(--primary);
    --card-text: var(--text);
    --card-muted: #d6c2ab;
    --card-desc: #e7d7c4;
    --modal-control-bg: var(--surface);
    --modal-control-hover: var(--border);
    --modal-danger: var(--primary);
}

* { box-sizing: border-box; }
html { scroll-behavior: smooth; }

body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
}

/* CONTAINER */
.container {
    width: min(100%, var(--container));
    margin: 0 auto;
    padding: 0 16px;
}

/* HEADER */
.header {
    position: sticky;
    top: 0;
    z-index: 20;
    background: var(--header-bg);
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(10px);
}

.header-row {
    min-height: 62px;
    display: flex;
    align-items: center;
    justify-content: space-between;
}

.brand {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    color: inherit;
}

.logo {
    width: 40px;
    height: 40px;
    object-fit: cover;
    border-radius: 10px;
}

/* BURGER */
.menu-toggle {
    width: 44px;
    height: 44px;
    border: 1px solid var(--primary);
    border-radius: 12px;
    background: color-mix(in srgb, var(--header-bg) 82%, #000 18%);
    color: var(--card-text);

    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;

    gap: 5px;
    cursor: pointer;

    box-shadow: 0 0 0 3px rgba(255,255,255,0.04);
}

.menu-toggle span {
    width: 20px;
    height: 2px;
    border-radius: 999px;
    background: var(--card-text);
    transition: all 0.3s ease;
}

.theme-light_blue .menu-toggle {
    background: #ffffff;
    border-color: var(--border);
}

.theme-light_blue .menu-toggle span {
    background: #0f172a;
}

.menu-toggle.active span:nth-child(1) {
    transform: rotate(45deg) translate(4px, 4px);
}

.menu-toggle.active span:nth-child(2) {
    opacity: 0;
}

.menu-toggle.active span:nth-child(3) {
    transform: rotate(-45deg) translate(5px, -5px);
}

/* NAV */
.nav {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.4s ease;
    background: var(--nav-bg);
}

.nav.open {
    max-height: calc(100vh - 62px);
    overflow-y: auto;
}

.nav-list {
    list-style: none;
    padding: 0;
    margin: 0;
}

.nav-link {
    display: block;
    padding: 14px;
    border-bottom: 1px solid var(--border);
    text-decoration: none;
    color: var(--text);
    background: var(--nav-bg);
}

/* ===== SERVICES ===== */

.services-split {
    background: var(--dark);
    color: var(--on-dark);
    padding: 60px 0;
}

.split {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 40px;
    align-items: center;
}

/* LEFT */
.left h2 {
    margin-bottom: 20px;
}

.left ul {
    list-style: none;
    padding: 0;
    margin: 0;
}

.service-item {
    padding: 12px 0;
    border-bottom: 1px solid var(--dark-border);
    cursor: pointer;
    transition: 0.2s;
}

.service-item:hover {
    transform: translateX(5px);
}

.service-item.active {
    color: var(--button-text);
    font-weight: 600;
}

/* RIGHT */
.highlight {
    background: var(--dark-surface);
    padding: 24px;
    border-radius: 14px;
    border: 1px solid var(--dark-border);
    transition: opacity 0.3s ease;

    color: var(--card-text);
}

.highlight h3 {
    color: var(--card-text);
}

.highlight p {
    color: var(--card-desc);
}

.highlight.fade {
    opacity: 0.4;
}

.highlight-img {
    width: 100%;
    height: 200px;
    object-fit: cover;
    border-radius: 10px;
    margin-bottom: 15px;
}

.btn-primary {
    display: inline-block;
    margin-top: 15px;
    background: var(--primary);
    color: var(--button-text);
    padding: 10px 16px;
    border-radius: 10px;
    text-decoration: none;
    transition: 0.2s ease;
}

.btn-primary:hover {
    background: var(--primary-dark);
}

/* MOBILE */
@media (max-width: 768px) {
    .split {
        grid-template-columns: 1fr;
        gap: 24px;
    }

    .services-split {
        padding: 40px 0;
    }
}
</style>

</head>

{% set theme = config.get('theme', {}).get('scheme', 'default') %}
<body class="theme-{{ theme }}">

{% block content %}{% endblock %}

<script>
document.addEventListener("DOMContentLoaded", function () {

    /* BURGER */
    const btn = document.getElementById("menuToggle");
    const nav = document.getElementById("siteNav");

    if (btn && nav) {
        btn.onclick = () => {
            nav.classList.toggle("open");
            btn.classList.toggle("active");
        };

        document.querySelectorAll(".nav-link").forEach(link => {
            link.onclick = () => {
                nav.classList.remove("open");
                btn.classList.remove("active");
            };
        });
    }

    /* ===== SERVICES INTERACTIVE ===== */

    const items = document.querySelectorAll(".service-item");
    const title = document.getElementById("serviceTitle");
    const desc = document.getElementById("serviceDescription");
    const img = document.getElementById("serviceImage");
    const box = document.getElementById("serviceDisplay");

    if (!items.length || !title || !desc || !box) return;

    items.forEach(item => {
        item.addEventListener("click", () => {

            items.forEach(i => i.classList.remove("active"));
            item.classList.add("active");

            box.classList.add("fade");

            setTimeout(() => {

                title.textContent = item.dataset.title;
                desc.textContent = item.dataset.description || "";

                if (img && item.dataset.photo) {
                    img.src = item.dataset.photo;
                    img.style.display = "block";
                }

                if (img && !item.dataset.photo) {
                    img.style.display = "none";
                }

                box.classList.remove("fade");

            }, 150);
        });
    });

});
</script>

</body>
</html>
