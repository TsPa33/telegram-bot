<!doctype html>
<html lang="uk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>{% block title %}{% endblock %}</title>

<style>
:root {
    --primary: #2563eb;
    --primary-dark: #1d4ed8;
    --dark: #0f172a;
    --bg: #f5f7fa;
    --text: #1f2937;
    --surface: #ffffff;
    --muted: #64748b;
    --border: #e2e8f0;
    --container: 1120px;
}

* { box-sizing: border-box; }
html { scroll-behavior: smooth; }

body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
}

/* CONTAINER */
.container {
    width: min(100%, var(--container));
    margin: 0 auto;
    padding: 0 16px;
}

/* HEADER */
.header {
    position: sticky;
    top: 0;
    z-index: 20;
    background: rgba(255,255,255,0.98);
    border-bottom: 1px solid var(--border);
}

.header-row {
    min-height: 62px;
    display: flex;
    align-items: center;
    justify-content: space-between;
}

.brand {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    color: inherit;
}

.logo {
    width: 40px;
    height: 40px;
    object-fit: cover;
    border-radius: 10px;
}

/* BURGER */
.menu-toggle {
    width: 42px;
    height: 42px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: #fff;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 4px;
    cursor: pointer;
}

.menu-toggle span {
    width: 18px;
    height: 2px;
    background: var(--dark);
    transition: all 0.3s ease;
}

.menu-toggle.active span:nth-child(1) {
    transform: rotate(45deg) translate(4px, 4px);
}
.menu-toggle.active span:nth-child(2) {
    opacity: 0;
}
.menu-toggle.active span:nth-child(3) {
    transform: rotate(-45deg) translate(5px, -5px);
}

/* NAV */
.nav {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.4s ease;
    background: #fff;
}

.nav.open {
    max-height: 300px;
}

.nav-list {
    list-style: none;
    padding: 0;
    margin: 0;
}

.nav-link {
    display: block;
    padding: 14px;
    border-bottom: 1px solid var(--border);
    text-decoration: none;
    color: var(--text);
    background: #fff;
}

/* ===== SERVICES ===== */

.services-split {
    background: var(--dark);
    color: #e5e7eb;
    padding: 60px 0;
}

.split {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 40px;
    align-items: center;
}

/* LEFT */
.left h2 {
    margin-bottom: 20px;
}

.left ul {
    list-style: none;
    padding: 0;
    margin: 0;
}

.service-item {
    padding: 12px 0;
    border-bottom: 1px solid #1f2937;
    cursor: pointer;
    transition: 0.2s;
}

.service-item:hover {
    transform: translateX(5px);
}

.service-item.active {
    color: #fff;
    font-weight: 600;
}

/* RIGHT */
.highlight {
    background: #111827;
    padding: 24px;
    border-radius: 14px;
    border: 1px solid #1f2937;
    transition: opacity 0.3s ease;
}

.highlight.fade {
    opacity: 0.4;
}

.highlight-img {
    width: 100%;
    height: 200px;
    object-fit: cover;
    border-radius: 10px;
    margin-bottom: 15px;
}

.btn-primary {
    display: inline-block;
    margin-top: 15px;
    background: var(--primary);
    color: #fff;
    padding: 10px 16px;
    border-radius: 10px;
    text-decoration: none;
}

/* MOBILE */
@media (max-width: 768px) {
    .split {
        grid-template-columns: 1fr;
        gap: 24px;
    }

    .services-split {
        padding: 40px 0;
    }
}
</style>

</head>

<body>

{% block content %}{% endblock %}

<script>
document.addEventListener("DOMContentLoaded", function () {

    /* BURGER */
    const btn = document.getElementById("menuToggle");
    const nav = document.getElementById("siteNav");

    if (btn && nav) {
        btn.onclick = () => {
            nav.classList.toggle("open");
            btn.classList.toggle("active");
        };

        document.querySelectorAll(".nav-link").forEach(link => {
            link.onclick = () => {
                nav.classList.remove("open");
                btn.classList.remove("active");
            };
        });
    }

    /* ===== SERVICES INTERACTIVE ===== */

    const items = document.querySelectorAll(".service-item");
    const title = document.getElementById("serviceTitle");
    const desc = document.getElementById("serviceDescription");
    const img = document.getElementById("serviceImage");
    const box = document.getElementById("serviceDisplay");

    if (!items.length || !title || !desc || !box) return;

    items.forEach(item => {
        item.addEventListener("click", () => {

            items.forEach(i => i.classList.remove("active"));
            item.classList.add("active");

            box.classList.add("fade");

            setTimeout(() => {

                title.textContent = item.dataset.title;
                desc.textContent = item.dataset.description;

                if (img && item.dataset.photo) {
                    img.src = item.dataset.photo;
                    img.style.display = "block";
                }

                if (img && !item.dataset.photo) {
                    img.style.display = "none";
                }

                box.classList.remove("fade");

            }, 150);
        });
    });

});
</script>

</body>
</html>
