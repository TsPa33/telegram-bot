<!doctype html>
<html lang="uk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>{% block title %}{% endblock %}</title>

<style>
:root {
    --primary: #2563eb;
    --primary-dark: #1d4ed8;
    --dark: #0f172a;
    --bg: #f5f7fa;
    --text: #1f2937;
    --surface: #ffffff;
    --muted: #64748b;
    --border: #e2e8f0;
    --container: 1120px;
}

* { box-sizing: border-box; }
html { scroll-behavior: smooth; }

body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
}

/* CONTAINER */
.container {
    width: min(100%, var(--container));
    margin: 0 auto;
    padding: 0 16px;
}

/* HEADER */
.header {
    position: sticky;
    top: 0;
    z-index: 20;
    background: rgba(255,255,255,0.98);
    border-bottom: 1px solid var(--border);
}

.header-row {
    min-height: 62px;
    display: flex;
    align-items: center;
    justify-content: space-between;
}

.brand {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    color: inherit;
}

.logo {
    width: 40px;
    height: 40px;
    object-fit: cover;
    border-radius: 10px;
}

/* BURGER */
.menu-toggle {
    width: 42px;
    height: 42px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: #fff;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 4px;
    cursor: pointer;
}

.menu-toggle span {
    width: 18px;
    height: 2px;
    background: var(--dark);
    transition: all 0.3s ease;
}

/* BURGER ANIMATION */
.menu-toggle.active span:nth-child(1) {
    transform: rotate(45deg) translate(4px, 4px);
}
.menu-toggle.active span:nth-child(2) {
    opacity: 0;
}
.menu-toggle.active span:nth-child(3) {
    transform: rotate(-45deg) translate(5px, -5px);
}

/* NAV (SMOOTH) */
.nav {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.4s ease;
    background: #fff;
}

.nav.open {
    max-height: 300px;
}

/* LINKS */
.nav-list {
    list-style: none;
    padding: 0;
    margin: 0;
}

.nav-link {
    display: block;
    padding: 14px;
    border-bottom: 1px solid var(--border);
    text-decoration: none;
    color: var(--text);
    background: #fff;
}

/* GRID */
.card-grid {
    display:grid;
    gap:16px;
    grid-template-columns: repeat(1,1fr);
}

@media (min-width:768px){
    .card-grid { grid-template-columns: repeat(2,1fr); }
}

@media (min-width:1024px){
    .card-grid { grid-template-columns: repeat(3,1fr); }
}

/* CARD */
.card {
    background:#fff;
    border:1px solid var(--border);
    border-radius:16px;
    padding:16px;
}

/* IMAGE */
.card-photo {
    width:100%;
    height:200px;
    object-fit:contain;
    background:#f1f5f9;
    border-radius:10px;
    padding:10px;
    margin-bottom:10px;
}

/* BUTTON */
.btn {
    background:var(--primary);
    color:#fff;
    border:none;
    border-radius:10px;
    padding:10px 14px;
}

/* FOOTER */
.footer {
    margin-top:40px;
    border-top:1px solid var(--border);
    background:#fff;
    padding:20px;
    text-align:center;
}
</style>

</head>

<body>

{% block content %}{% endblock %}

<script>
document.addEventListener("DOMContentLoaded", function () {

    const btn = document.getElementById("menuToggle");
    const nav = document.getElementById("siteNav");

    if (btn && nav) {
        btn.onclick = () => {
            nav.classList.toggle("open");
            btn.classList.toggle("active");
        };

        document.querySelectorAll(".nav-link").forEach(link => {
            link.onclick = () => {
                nav.classList.remove("open");
                btn.classList.remove("active");
            };
        });
    }

});
</script>

</body>
</html>
