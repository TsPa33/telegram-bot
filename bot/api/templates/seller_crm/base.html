<!doctype html>
<html lang="uk">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}{{ title or "Професійна CRM CarPot" }}{% endblock %}</title>
    <style>
        :root{color-scheme:dark;--bg:#06111f;--panel:rgba(12,24,41,.82);--panel2:rgba(15,29,49,.96);--line:rgba(148,163,184,.18);--text:#edf7ff;--muted:#92a6bb;--blue:#25d7ff;--green:#34f5a6;--red:#fb7185;--yellow:#fbbf24;--shadow:0 24px 80px rgba(0,0,0,.35);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
        *{box-sizing:border-box} body{margin:0;min-height:100vh;background:radial-gradient(circle at 14% 0%,rgba(37,215,255,.16),transparent 34rem),radial-gradient(circle at 86% 10%,rgba(52,245,166,.12),transparent 32rem),linear-gradient(135deg,#06111f,#0b1628);color:var(--text)}
        a{color:var(--blue)} .shell{display:grid;grid-template-columns:280px minmax(0,1fr);min-height:100vh}.side{position:sticky;top:0;height:100vh;padding:24px 18px;border-right:1px solid var(--line);background:rgba(7,17,31,.78);backdrop-filter:blur(18px)}
        .brand{display:flex;gap:12px;align-items:center;text-decoration:none;color:#fff;margin-bottom:24px}.mark{width:44px;height:44px;border-radius:16px;display:grid;place-items:center;background:linear-gradient(135deg,rgba(37,215,255,.22),rgba(52,245,166,.18));border:1px solid rgba(37,215,255,.28);box-shadow:0 0 36px rgba(37,215,255,.18)}.brand b{font-size:18px}.brand span{display:block;color:var(--muted);font-size:12px;font-weight:700}
        .nav{display:grid;gap:8px}.nav a{padding:12px 13px;border-radius:14px;color:var(--muted);text-decoration:none;font-weight:800;border:1px solid transparent}.nav a:hover,.nav a.active{color:#fff;background:linear-gradient(135deg,rgba(37,215,255,.12),rgba(52,245,166,.08));border-color:rgba(37,215,255,.2)}
        .main{min-width:0}.top{position:sticky;top:0;z-index:5;padding:18px clamp(18px,3vw,36px);border-bottom:1px solid var(--line);background:rgba(7,17,31,.72);backdrop-filter:blur(18px);display:flex;justify-content:space-between;gap:16px;align-items:center}.kicker{margin:0;color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.08em;font-weight:850}.top h1{margin:2px 0 0;font-size:22px}.pill{border:1px solid var(--line);border-radius:999px;padding:9px 12px;background:var(--panel);font-weight:800;color:#fff}.content{padding:28px clamp(18px,3vw,36px) 44px}.grid{display:grid;gap:16px}.cards{grid-template-columns:repeat(5,minmax(0,1fr))}.card{border:1px solid var(--line);border-radius:24px;background:var(--panel);box-shadow:var(--shadow);padding:18px}.card h3{margin:0 0 10px;font-size:15px;color:#fff}.metric{font-size:30px;font-weight:950;letter-spacing:-.04em}.muted{color:var(--muted)}.two{grid-template-columns:1.25fr .75fr}.table{width:100%;border-collapse:collapse}.table th,.table td{padding:12px;border-bottom:1px solid var(--line);text-align:left}.table th{color:var(--muted);font-size:12px;text-transform:uppercase}.badge{padding:5px 9px;border-radius:999px;background:rgba(37,215,255,.12);color:var(--blue);font-weight:850;font-size:12px}.btn{display:inline-flex;align-items:center;justify-content:center;border:0;border-radius:14px;padding:11px 14px;background:linear-gradient(135deg,var(--blue),var(--green));color:#03111d;text-decoration:none;font-weight:950;cursor:pointer}.login{min-height:100vh;display:grid;place-items:center;padding:18px}.login-card{width:min(480px,100%);border:1px solid var(--line);border-radius:28px;background:var(--panel);box-shadow:var(--shadow);padding:28px}.field{display:grid;gap:7px;margin:14px 0}.field input{width:100%;border:1px solid var(--line);border-radius:14px;background:rgba(255,255,255,.04);color:#fff;padding:13px}.error{border:1px solid rgba(251,113,133,.35);color:#fecdd3;background:rgba(251,113,133,.09);padding:12px;border-radius:14px}.demo-ribbon{display:inline-flex;margin-bottom:16px;border:1px solid rgba(251,191,36,.35);color:#fde68a;background:rgba(251,191,36,.1);padding:8px 12px;border-radius:999px;font-weight:900}
        @media(max-width:980px){.shell{grid-template-columns:1fr}.side{position:relative;height:auto}.cards{grid-template-columns:repeat(2,minmax(0,1fr))}.two{grid-template-columns:1fr}.top{position:relative}}@media(max-width:620px){.cards{grid-template-columns:1fr}.table{font-size:13px}}
    </style>
</head>
<body>{% block body %}{% endblock %}</body>
</html>
