<section class="hero">
    {% set hero = config.get('hero', {}) if config else {} %}
    {% set banners = hero.get('banners', []) %}

    {% if banners %}
        <div class="hero-slider" id="heroSlider">
            {% for banner in banners %}
                <div class="hero-slide{% if loop.first %} active{% endif %}">
                    <img src="{{ banner }}" alt="banner {{ loop.index }}">
                </div>
            {% endfor %}
        </div>
    {% endif %}
</section>

<style>
/* ===== DESKTOP ===== */
.hero {
    width: 100vw;
    height: 100vh;

    margin-left: calc(-50vw + 50%);
    margin-right: calc(-50vw + 50%);

    overflow: hidden;
    position: relative;
}

/* SLIDER */
.hero-slider {
    width: 100%;
    height: 100%;
    position: relative;
}

/* SLIDES */
.hero-slide {
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 1s ease;
}

/* ACTIVE */
.hero-slide.active {
    opacity: 1;
    z-index: 1;
}

/* IMAGE DESKTOP */
.hero-slide img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* ===== MOBILE FIX (ПРАВИЛЬНИЙ) ===== */
@media (max-width: 768px) {

    .hero {
        height: auto;
    }

    .hero-slider {
        position: relative;
        width: 100%;
        height: auto;
    }

    /* 🔥 ВСІ слайди overlay */
    .hero-slide {
        position: absolute;
        inset: 0;
        opacity: 0;
    }

    /* 🔥 ТІЛЬКИ АКТИВНИЙ задає висоту */
    .hero-slide.active {
        position: relative;
        opacity: 1;
        z-index: 1;
    }

    .hero-slide img {
        width: 100%;
        height: auto;
        object-fit: contain;
        display: block;
    }
}
</style>

<script>
document.addEventListener("DOMContentLoaded", function () {
    const slider = document.getElementById("heroSlider");
    if (!slider) return;

    const slides = slider.querySelectorAll(".hero-slide");
    if (!slides.length) return;

    let index = 0;

    slides[index].classList.add("active");

    setInterval(() => {
        slides[index].classList.remove("active");
        index = (index + 1) % slides.length;
        slides[index].classList.add("active");
    }, 4000);
});
</script>
