{% if hero.get('banners') %}
<section class="hero-slider">
{% for banner in hero.get('banners', []) %}
<img src="{{ banner }}" class="slide {% if loop.index == 1 %}active{% endif %}">
{% endfor %}
</section>
{% endif %}

<section class="hero">
<div class="container">
<h1>{{ header.get('title') }}</h1>
<p>{{ hero.get('subtitle') }}</p>
</div>
</section>
