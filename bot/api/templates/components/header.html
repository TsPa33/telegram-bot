<header class="header">
    <div class="container header-row">

        <a href="#top" class="brand">
            {% if header.get('logo') %}
            <img src="{{ header.get('logo') }}" class="logo">
            {% endif %}
        </a>

        {% if seller and seller.get('shop_name') %}
        <div class="shop-title">
            {{ seller.get('shop_name') }}
        </div>
        {% endif %}

        <!-- BURGER -->
        <button id="menuToggle" class="menu-toggle">
            <span></span>
            <span></span>
            <span></span>
        </button>

    </div>

    <!-- MENU -->
    <nav id="siteNav" class="nav">
        <ul class="nav-list">
            <li><a href="#top" class="nav-link">Головна</a></li>
            <li><a href="#services" class="nav-link">Послуги</a></li>
            <li><a href="#prices" class="nav-link">Ціни</a></li>
            <li><a href="#about" class="nav-link">Про нас</a></li>
            <li><a href="#contacts" class="nav-link">Контакти</a></li>
        </ul>
    </nav>
</header>

<style>
.shop-title {
    flex: 1;
    text-align: center;
    color: #ffffff;
    font-size: 18px;
    font-weight: 700;
    line-height: 1.2;
    padding: 0 16px;
    word-break: break-word;
}

@media (max-width: 768px) {
    .shop-title {
        font-size: 15px;
        padding: 0 10px;
    }
}
</style>
