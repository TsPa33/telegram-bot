<section id="cars" class="section">
    <div class="container">

        <h2>Авто</h2>

        <div class="cars-grid">
            {% for c in cars %}
            <div class="car-card">

                <!-- IMAGE -->
                <div class="car-image">
                    {% if c.photo_url %}
                        <img src="{{ c.photo_url }}" alt="{{ c.title }}">
                    {% else %}
                        <div class="car-placeholder">No Image</div>
                    {% endif %}
                </div>

                <!-- CONTENT -->
                <div class="car-content">
                    <h3 class="car-title">
                        {{ c.title or (c.brand ~ " " ~ c.model) }}
                    </h3>

                    {% if c.description %}
                        <p class="car-desc">{{ c.description }}</p>
                    {% endif %}
                </div>

            </div>
            {% endfor %}
        </div>

    </div>
</section>


<style>

/* ===== GRID ===== */
.cars-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 20px;
    margin-top: 20px;
}

/* ===== CARD ===== */
.car-card {
    background: #0f172a;
    border-radius: 16px;
    overflow: hidden;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.car-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 10px 25px rgba(0,0,0,0.4);
}

/* ===== IMAGE ===== */
.car-image {
    width: 100%;
    aspect-ratio: 16 / 9;
    overflow: hidden;
    background: #1e293b;
}

.car-image img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
}

/* ===== PLACEHOLDER ===== */
.car-placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #94a3b8;
    font-size: 14px;
}

/* ===== CONTENT ===== */
.car-content {
    padding: 16px;
}

.car-title {
    font-size: 18px;
    font-weight: 600;
    color: #fff;
    margin-bottom: 8px;
}

.car-desc {
    font-size: 14px;
    color: #cbd5f5;
    line-height: 1.4;
}

/* ===== MOBILE ===== */
@media (max-width: 768px) {
    .cars-grid {
        grid-template-columns: 1fr;
    }
}

</style>
