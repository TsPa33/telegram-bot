<section id="contacts" class="section">
    <div class="container">

        <h2>Контакти</h2>

        <div class="contacts-grid">

            <!-- CONTACT INFO -->
            <div class="contact-card">
                {% if contacts.get('phone') %}
                    <p class="contact-item">📞 {{ contacts.get('phone') }}</p>
                {% endif %}

                {% if contacts.get('address') %}
                    <p class="contact-item">📍 {{ contacts.get('address') }}</p>
                {% endif %}
            </div>

            <!-- FORM -->
            <div class="contact-card">
                <form method="post" action="/site/{{ subdomain }}/lead" class="contact-form">

                    <input type="text" name="name" placeholder="Ваше ім’я" required>
                    <input type="tel" name="phone" placeholder="Телефон" required>
                    <textarea name="message" placeholder="Повідомлення"></textarea>

                    <button type="submit" class="btn">Відправити</button>

                </form>
            </div>

        </div>

    </div>
</section>


<style>

/* ===== GRID ===== */
.contacts-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-top: 20px;
}

/* ===== CARD ===== */
.contact-card {
    background: #0f172a;
    border-radius: 16px;
    padding: 20px;
}

/* ===== TEXT ===== */
.contact-item {
    color: #e2e8f0;
    margin-bottom: 10px;
    font-size: 16px;
}

/* ===== FORM ===== */
.contact-form {
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.contact-form input,
.contact-form textarea {
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: #1e293b;
    color: #fff;
    font-size: 14px;
}

.contact-form textarea {
    min-height: 100px;
    resize: none;
}

/* ===== BUTTON ===== */
.btn {
    background: #ef4444;
    color: #fff;
    border: none;
    padding: 12px;
    border-radius: 10px;
    cursor: pointer;
    font-weight: 500;
    transition: background 0.2s;
}

.btn:hover {
    background: #dc2626;
}

/* ===== MOBILE ===== */
@media (max-width: 768px) {
    .contacts-grid {
        grid-template-columns: 1fr;
    }
}

</style>
