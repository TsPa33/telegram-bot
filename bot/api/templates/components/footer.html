{% set footer = config.get('footer', {}) %}

<footer class="site-footer">

  <div class="container footer-inner">

    <div class="footer-left">
      <h3>{{ config.get('header', {}).get('title') or "Сайт" }}</h3>
      <p>{{ footer.get('text') or "Всі права захищені" }}</p>
    </div>

    <div class="footer-right">
      <a href="#">Головна</a>
      <a href="#services">Послуги</a>
      <a href="#contacts">Контакти</a>
    </div>

  </div>

</footer>


<style>

/* ===== FOOTER ===== */

.site-footer {
    background: #0f172a;
    color: #e5e7eb;
    padding: 40px 0;
    margin-top: 60px;
}

.footer-inner {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 30px;
    flex-wrap: wrap;
}

.footer-left h3 {
    margin: 0 0 10px;
}

.footer-left p {
    margin: 0;
    color: #94a3b8;
}

.footer-right {
    display: flex;
    gap: 20px;
}

.footer-right a {
    color: #e5e7eb;
    text-decoration: none;
    transition: 0.2s;
}

.footer-right a:hover {
    color: #3b82f6;
}

/* MOBILE */

@media (max-width: 768px) {
    .footer-inner {
        flex-direction: column;
        align-items: flex-start;
    }

    .footer-right {
        flex-direction: column;
        gap: 10px;
    }
}

</style>
