<section id="services" class="services-split">
<div class="container split">

    <!-- LEFT -->
    <div class="left">
        <h2>Послуги</h2>

        <ul>
        {% for s in services %}
            <li>{{ s.title }}</li>
        {% endfor %}
        </ul>
    </div>

    <!-- RIGHT -->
    <div class="right">
        {% if services and services[0] %}
        {% set main = services[0] %}

        <div class="highlight">

            {% if main.photo_url %}
            <img src="{{ main.photo_url }}" class="highlight-img">
            {% endif %}

            <h3>{{ main.title }}</h3>
            <p>{{ main.description }}</p>

            <a class="btn-primary" href="#contacts">Замовити</a>

        </div>
        {% endif %}
    </div>

</div>
</section>
