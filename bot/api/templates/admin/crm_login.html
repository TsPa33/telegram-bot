{% extends "admin/crm_base.html" %}

{% block title %}CRM Login{% endblock %}
{% block nav %}{% endblock %}

{% block head %}
<style>
    .crm-login-wrap {
        min-height: calc(100vh - 160px);
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .crm-login-card {
        width: min(100%, 420px);
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 20px;
        box-shadow: 0 18px 50px rgba(15, 23, 42, 0.10);
        padding: 28px;
    }

    .crm-login-title {
        margin: 0 0 8px;
        font-size: 28px;
        line-height: 1.2;
    }

    .crm-login-subtitle {
        margin: 0 0 24px;
        color: var(--muted);
        line-height: 1.5;
    }

    .crm-login-field {
        display: grid;
        gap: 8px;
        margin-bottom: 16px;
    }

    .crm-login-field label {
        font-size: 14px;
        font-weight: 700;
    }

    .crm-login-field input {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 12px;
        font: inherit;
        padding: 12px 14px;
        outline: none;
        transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    .crm-login-field input:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.14);
    }

    .crm-login-error {
        background: #fef2f2;
        border: 1px solid #fecaca;
        border-radius: 12px;
        color: #991b1b;
        margin-bottom: 16px;
        padding: 12px 14px;
        font-size: 14px;
        line-height: 1.4;
    }

    .crm-login-submit {
        width: 100%;
        border: 0;
        border-radius: 12px;
        background: var(--primary);
        color: #ffffff;
        cursor: pointer;
        font: inherit;
        font-weight: 700;
        padding: 12px 16px;
    }

    .crm-login-submit:hover {
        background: var(--primary-dark);
    }

    @media (max-width: 520px) {
        .crm-main {
            padding: 24px 16px;
        }

        .crm-login-card {
            padding: 22px;
        }
    }
</style>
{% endblock %}

{% block content %}
<section class="crm-login-wrap">
    <form class="crm-login-card" method="post" action="/admin/crm/login">
        <h1 class="crm-login-title">Вхід до CRM</h1>
        <p class="crm-login-subtitle">Увійдіть за логіном і паролем адміністратора.</p>

        {% if error %}
            <div class="crm-login-error" role="alert">{{ error }}</div>
        {% endif %}

        <div class="crm-login-field">
            <label for="username">Логін</label>
            <input
                id="username"
                name="username"
                type="text"
                value="{{ username or '' }}"
                autocomplete="username"
                autocapitalize="none"
                spellcheck="false"
                required
            >
        </div>

        <div class="crm-login-field">
            <label for="password">Пароль</label>
            <input
                id="password"
                name="password"
                type="password"
                autocomplete="current-password"
                required
            >
        </div>

        <button class="crm-login-submit" type="submit">Увійти</button>
    </form>
</section>
{% endblock %}
