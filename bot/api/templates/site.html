<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ config.header.title or subdomain }}</title>
</head>
<body>
    <header>
        <h1>{{ config.header.title }}</h1>
    </header>

    <main>
        <section>
            <h2>Contacts</h2>
            <p>Phone: {{ config.contacts.phone }}</p>
        </section>

        <section>
            <h2>Services</h2>
            <p>Enabled: {{ config.services.enabled }}</p>
        </section>
    </main>
</body>
</html>
