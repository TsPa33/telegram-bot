<!doctype html>
<html lang="uk">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ config.header.title or subdomain }}</title>
</head>
<body>

    <header>
        <h1>{{ config.header.title }}</h1>
    </header>

    <main>

        {% if config.about.enabled %}
        <section>
            <h2>Про нас</h2>
            <p>{{ config.about.text }}</p>
        </section>
        {% endif %}

        <section>
            <h2>Контакти</h2>
            <p>Телефон: {{ config.contacts.phone }}</p>
            <p>Адреса: {{ config.contacts.address }}</p>
        </section>

        <section>
            <h2>Послуги</h2>
            <p>Активні: {{ config.services.enabled }}</p>
        </section>
        <section>
    <h2>Залишити заявку</h2>

    <form method="post" action="/site/{{ subdomain }}/lead">
        <input type="text" name="name" placeholder="Ваше ім'я" required><br><br>
        <input type="text" name="phone" placeholder="Телефон" required><br><br>
        <textarea name="message" placeholder="Повідомлення"></textarea><br><br>

        <button type="submit">Надіслати</button>
    </form>
</section>

    </main>

</body>
</html>
